name: Deploy apps to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "auto-video-editor/**"
      - "table-tennis-scorer/**"
      - "lesson-sales-entry/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            auto-video-editor/package-lock.json
            table-tennis-scorer/package-lock.json
            lesson-sales-entry/package-lock.json

      - name: Build AUTO CUT
        working-directory: auto-video-editor
        run: |
          npm ci
          npm run build

      - name: Build 卓球オートスコア
        working-directory: table-tennis-scorer
        run: |
          npm ci
          npm run build

      - name: Build レッスン売上入力
        working-directory: lesson-sales-entry
        run: |
          npm ci
          npm run build

      - name: Assemble combined site
        run: |
          mkdir -p site
          cp -r auto-video-editor/dist/. site/
          mkdir -p site/table-tennis-scorer
          cp -r table-tennis-scorer/dist/. site/table-tennis-scorer/
          mkdir -p site/lesson-sales-entry
          cp -r lesson-sales-entry/dist/. site/lesson-sales-entry/

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
