<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>レッスン売上入力 — 売上シートに直接記入</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">💴</span>
          <span class="brand-name">レッスン売上入力</span>
        </div>
        <p class="tagline">毎月の「レッスン売上◯月」シートに、そのまま1行追加します。</p>
      </header>

      <main class="stage">
        <section id="settings" class="panel">
          <button id="settings-toggle" class="settings-toggle" type="button">⚙ 接続設定</button>
          <div id="settings-body" class="settings-body hidden">
            <label class="form-field">
              Google OAuth クライアントID
              <input id="client-id-input" type="text" placeholder="xxxxxxxx.apps.googleusercontent.com" />
            </label>
            <label class="form-field">
              スプレッドシートID
              <input id="spreadsheet-id-input" type="text" placeholder="スプレッドシートIDを入力" />
            </label>
            <button id="save-settings-btn" class="btn btn-secondary" type="button">保存</button>
            <p class="option-note">
              初回のみ、Google Cloud で作成した OAuth クライアントIDを入力してください（README参照）。この端末のブラウザにのみ保存されます。
            </p>
          </div>
        </section>

        <section id="auth-section" class="panel auth-panel">
          <button id="login-btn" class="btn btn-primary btn-large" type="button">Googleでログイン</button>
          <p id="auth-status" class="status-line"></p>
        </section>

        <section id="main-section" class="panel hidden">
          <div class="month-row">
            <label class="form-field month-select-field">
              入力する月
              <select id="month-select"></select>
            </label>
            <button id="new-month-btn" class="btn btn-ghost" type="button">＋ 新しい月のシートを作成</button>
            <button id="reload-btn" class="btn btn-ghost" type="button">↻ 再読込</button>
          </div>
          <p id="sheet-status" class="status-line"></p>

          <form id="entry-form" class="entry-form">
            <div class="form-row">
              <label class="form-field">
                日付
                <input id="f-date" type="date" required />
              </label>
              <label class="form-field">
                場所
                <input id="f-venue" list="venue-list" autocomplete="off" />
                <datalist id="venue-list"></datalist>
              </label>
              <label class="form-field">
                人
                <input id="f-people" list="people-list" autocomplete="off" />
                <datalist id="people-list"></datalist>
              </label>
            </div>
            <div class="form-row">
              <label class="form-field">
                時間
                <input id="f-hours" type="number" step="0.5" min="0" value="1" />
              </label>
              <label class="form-field">
                売上（円）
                <input id="f-sales" type="number" step="1" min="0" />
              </label>
              <label class="form-field">
                場所代（円）
                <input id="f-venue-fee" type="number" step="1" min="0" value="0" />
              </label>
              <label class="form-field">
                交通費（円・駅入力で自動計算）
                <input id="f-transport" type="number" step="1" min="0" value="0" />
              </label>
            </div>
            <div class="form-row">
              <label class="form-field">
                出発駅
                <input id="f-from-station" list="station-list" autocomplete="off" />
              </label>
              <label class="form-field">
                到着駅
                <input id="f-to-station" list="station-list" autocomplete="off" />
                <datalist id="station-list"></datalist>
              </label>
              <label class="form-field">
                往復・片道
                <select id="f-trip-type">
                  <option value="片道" selected>片道</option>
                  <option value="往復">往復</option>
                </select>
              </label>
            </div>
            <button id="submit-btn" class="btn btn-primary btn-large" type="submit">シートに追加する</button>
          </form>

          <p id="submit-status" class="status-line"></p>

          <div class="recent-panel">
            <h3>直近の入力</h3>
            <div class="table-wrap">
              <table id="recent-table" class="recent-table">
                <thead>
                  <tr id="recent-head"></tr>
                </thead>
                <tbody id="recent-body"></tbody>
              </table>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <p>入力データは Google Sheets API 経由で、あなたの Google アカウントの権限でスプレッドシートに直接書き込まれます。他のサーバーへは送信されません。</p>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
